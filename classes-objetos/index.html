<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Números aleatórios</title>
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./numeros.js"></script>
</head>
<body class="sorteador">
    <!--EMMET header.sorteador__header+main.sorteador__main+footer.sorteador__footer-->
    <header class="sorteador__header">
    <!--EMMET h1.sorteador__title{sorteador de Números Aleatórios}-->
        <h1 class="sorteador__title">Sorteador de Números Aleatórios</h1>
    </header>

    <main class="sorteador__main">
        <!--EMMET section.sorteador__intervalo.intervalo+section.sorteador__area.area+section.sorteador__historico.historico-->
        <section class="sorteador__intervalo intervalo">

            <label class="intervalo__label" for="valor-minimo">Valor mínimo:<span class="intervalo__valor intervalo__slider--min"></span></label>
            <input class="intervalo__slider intervalo__slider--min" type="range" name="valor-minimo" id="valor-minimo" min="1" max="100">

            <label class="intervalo__label" for="valor-maximo">Valor máximo:<span class="intervalo__valor intervalo__slider--max"></span></label>
            <input class="intervalo__slider intervalo__slider--max" type="range" name="valor-maximo" id="valor-maximo" min="1" max="100">

        </section>


        <section class="sorteador__area area">
            <button class="area__button">Sortear</button>
            <span class="area__numero">0</span>
        </section>


        <section class="sorteador__historico historico">
            <h2 class="historico__title">Histórico</h2>
            <ul class="historico__lista"></ul>
        </section>

        
    </main>
    <!--EMMET footer.sorteador__footer>button.sorteador__limpar-->
    <footer class="sorteador__footer">
        <button class="sorteador__limpar">Limpar histórico</button>
    </footer>

</body>
</html>
